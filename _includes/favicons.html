<!--
  Favicon using logo.png
-->

{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}

<link rel="icon" type="image/png" href="{{ favicon_path }}/logo.png">
<link rel="shortcut icon" href="{{ favicon_path }}/logo.png">
<link rel="apple-touch-icon" href="{{ favicon_path }}/logo.png">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest">
{% endif %}
